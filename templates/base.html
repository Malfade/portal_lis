<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Licensing{% endblock %}</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f1419; color: #e6edf3; }
    a { color: #58a6ff; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { border: 1px solid #30363d; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #161b22; }
    form.inline { display: inline; }
    button, input[type=submit] { cursor: pointer; padding: 0.35rem 0.75rem; }
    input[type=text], input[type=password], input[type=datetime-local] {
      padding: 0.35rem 0.5rem; width: 100%; max-width: 28rem; background: #0d1117; color: #e6edf3; border: 1px solid #30363d;
    }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem 1.25rem; margin: 1rem 0; }
    .error { color: #f85149; }
    .ok { color: #3fb950; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.85rem; word-break: break-all; }
  </style>
</head>
<body>
<main>
  {% block body %}{% endblock %}
</main>
</body>
</html>
